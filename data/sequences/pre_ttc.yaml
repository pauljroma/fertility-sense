name: pre_ttc
description: "Pre-conception optimization for people planning to try in the future"
segment: pre_ttc
steps:
  - step: 1
    delay_days: 0
    subject: "Planning ahead gives you a real advantage"
    body: |
      Hi {name},

      You're thinking about fertility before you need to — and that puts you ahead of most people.

      The research is clear: a few months of preparation can meaningfully improve your chances when you're ready to start trying.

      We'll share the evidence-backed steps that actually matter (and skip the ones that don't).

      {cta}

  - step: 2
    delay_days: 3
    subject: "The one test worth doing now (even if you're not trying yet)"
    body: |
      Hi {name},

      If there's one thing you do right now, consider getting your AMH (Anti-Mullerian Hormone) tested.

      Why it matters:
      - AMH gives you a snapshot of your ovarian reserve
      - It doesn't change with your cycle, so you can test any time
      - Low results don't mean you can't conceive — but they might change your timeline
      - A simple blood test, usually $50-100 without insurance

      {personalized_insight}

      This isn't about creating anxiety. It's about having information so you can make choices on your own timeline.

      {cta}

  - step: 3
    delay_days: 7
    subject: "Lifestyle changes that actually move the needle"
    body: |
      Hi {name},

      Most "fertility lifestyle" advice is noise. Here's what the evidence supports:

      Meaningful impact:
      - Prenatal vitamins with folate (start 3 months before trying)
      - Moderate exercise (150 min/week — intense exercise can be counterproductive)
      - Limiting alcohol (the research on moderate intake is mixed, but reducing is low-cost)

      Probably doesn't matter:
      - Specific "fertility diets" (Mediterranean-style eating is fine, but no magic foods)
      - Most supplements beyond a good prenatal
      - Organic-only eating (the pesticide-fertility link is weak in humans)

      {personalized_insight}

      The biggest return on investment? Start the prenatal now and get the baseline bloodwork done.

      {cta}

  - step: 4
    delay_days: 14
    subject: "Your fertility timeline: what the data says by age"
    body: |
      Hi {name},

      We're not going to be alarmist. But the data is worth knowing:

      - Under 30: monthly conception rate ~25%. Time is on your side.
      - 30-34: monthly rate ~20%. Still strong, but worth starting your prep.
      - 35-37: monthly rate ~15%. Egg freezing becomes worth considering if you're not ready.
      - 38-40: monthly rate ~10%. Earlier evaluation is recommended.

      These are averages. Individual variation is huge — which is exactly why baseline testing matters.

      {personalized_insight}

      Whatever your situation, having data beats guessing. {consultation_cta}

  - step: 5
    delay_days: 28
    subject: "Ready when you are"
    body: |
      Hi {name},

      Whenever you're ready to start trying, you'll be more prepared than most. Here's a quick checklist:

      - Baseline bloodwork (AMH, thyroid, vitamin D)
      - 3+ months on prenatal vitamins
      - Know your cycle length and approximate ovulation window
      - Partner semen analysis (optional but high-value)

      {personalized_insight}

      If you want to talk through your specific situation, we offer free 20-minute consultations. No pressure, no sales pitch.

      {consultation_cta}
