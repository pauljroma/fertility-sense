name: re_engagement
description: "Re-engagement sequence for stale deals and inactive prospects"
segment: all
steps:
  - step: 1
    delay_days: 0
    subject: "What's new at WIN Fertility since we last talked"
    body: |
      Hi {first_name},

      It's been a while since we connected, and a lot has changed at WIN Fertility. A few highlights:

      - **Network expansion:** We added 150+ new providers in Q1, bringing our network to 900+ fertility clinics nationwide
      - **New cost data:** Our latest employer benchmark report shows 28% average savings vs. open-network fertility claims
      - **Client wins:** Several major employers in {industry} joined WIN this year

      I know timing is everything. If fertility benefits weren't a priority last time we spoke, they may be now — utilization is up 31% year-over-year and we're seeing more RFPs than ever.

      Worth a fresh look?

      Best,
      {sender_name}

  - step: 2
    delay_days: 7
    subject: "New proof point: employer savings data you haven't seen"
    body: |
      Hi {first_name},

      We just released our 2026 Employer Fertility Benchmark Report. Key findings:

      - Average employer spends $14,200 per fertility treatment cycle (open network)
      - WIN-managed employers average $9,100 per cycle — 36% lower
      - Live birth rates for WIN members exceed the national average by 12%
      - Member satisfaction: 94% NPS across all WIN-managed plans

      These numbers are based on 50,000+ treatment cycles across our employer client base, including Disney, Nvidia, and JPMorgan.

      I can share the full report and benchmark {company} against your industry peers. No strings attached.

      Best,
      {sender_name}

  - step: 3
    delay_days: 14
    subject: "Worth a 10-min reconnect?"
    body: |
      Hi {first_name},

      I'll keep this short. If fertility benefits are anywhere on {company}'s radar for this year, I'd love 10 minutes to share what's changed and why it might be worth revisiting.

      If the timing still isn't right, no hard feelings. I'll check back next quarter.

      Here's my calendar if you'd like to pick a time: {calendar_link}

      Best,
      {sender_name}
